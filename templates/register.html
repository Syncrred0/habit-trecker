<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold">🚀 Buat Akun Baru</h3>
            <p class="text-muted">Mulai lacak kebiasaan baikmu hari ini</p>
        </div>

        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" placeholder="Ketik username baru..." required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Ketik password baru..." required>
            </div>
            <button type="submit" class="btn btn-success w-100 mb-3">Daftar Sekarang</button>
        </form>

        <div class="text-center">
            <small>Sudah punya akun? <a href="/login" class="text-decoration-none">Masuk di sini</a></small>
        </div>
    </div>

</body>
</html>
