<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
<nav class="navbar navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🚀 HabitTracker</a>
            
            <div class="d-flex align-items-center">
                <span class="text-white me-3 fw-medium">Halo, {{ current_user.username }}!</span>
                <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <h3 class="mb-4 text-center">Daftar Kebiasaan Hari Ini</h3>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form class="d-flex" action="/tambah" method="POST">
                    <input class="form-control me-2" type="text" name="nama_habit" placeholder="Ketik kebiasaan baru..." required>
                    <button class="btn btn-primary" type="submit">Tambah</button>
                </form>
            </div>
        </div>

        <ul class="list-group shadow-sm">
            {% for habit in habits %}
            <li class="list-group-item d-flex justify-content-between align-items-center p-3">
                    <span class="fw-medium">
                    {{ habit.nama }}
                    <span class="badge bg-warning text-dark ms-2">🔥 {{ habit.streak }} Hari</span>
                </span>
                <div>
{% if habit.status == 'Selesai' %}
    <span class="badge bg-success rounded-pill px-3 py-2 me-2">Selesai ✅</span>
{% else %}
    <a href="/selesai/{{ habit.id }}" class="btn btn-outline-success btn-sm me-2">Tandai Selesai</a>
{% endif %}
                    
                    <a href="/hapus/{{ habit.id }}" class="btn btn-danger btn-sm">Hapus</a>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
